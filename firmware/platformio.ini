; ============================================================================
; MOKI — slow-tech E-Ink companion · firmware
; Target: LILYGO T5 E-Paper S3 Pro (ESP32-S3-WROOM-1, 8MB PSRAM, 16MB Flash)
;
; Stage 0: minimal — just compile, flash, Serial output via native USB-CDC.
; Heavier dependencies (lvgl, epdiy, MeshCore, etc.) get added in later stages.
; ============================================================================

[env:t5_s3_pro]
platform        = espressif32@^6.5.0
board           = esp32-s3-devkitc-1
framework       = arduino

monitor_speed   = 115200
upload_speed    = 921600

; Use the ESP32-S3 native USB-JTAG/CDC for Serial — that's how the T5 talks
; to the Mac when no CP210x is involved. Without these, Serial.print() goes
; nowhere visible.
build_flags     =
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DBOARD_HAS_PSRAM
    -DCORE_DEBUG_LEVEL=3

; PSRAM in OPI mode — the T5 S3 Pro uses Octal-SPI PSRAM
board_build.psram_type = opi
board_build.flash_mode = qio
board_build.f_flash    = 80000000L
