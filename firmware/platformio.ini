; ============================================================================
; MOKI · firmware · Stage 1ab — epdiy + LVGL on LILYGO T5 S3 Pro
;
; Custom board JSON (boards/T5-ePaper-S3.json) and vendored libs (lib/epdiy +
; lib/lvgl + lib/lv_conf.h) come from upstream Xinyuan-LilyGO/T5S3-4.7-e-paper-PRO.
; Their tested defaults are kept verbatim where they don't conflict with Moki.
; ============================================================================

[platformio]
boards_dir = boards

[env:t5_s3_pro]
platform        = espressif32@6.5.0
board           = T5-ePaper-S3
framework       = arduino

monitor_speed   = 115200
upload_speed    = 921600
monitor_filters = esp32_exception_decoder

build_flags =
    -DBOARD_HAS_PSRAM
    -DPSRAM_SPEED=120MHz
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DCORE_DEBUG_LEVEL=3
    -DDISABLE_ALL_LIBRARY_WARNINGS
    -Wl,--gc-sections

lib_deps =
    Wire
    SPI
