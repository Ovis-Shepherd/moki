; ============================================================================
; MOKI · firmware · Stage 1ab — epdiy + LVGL on LILYGO T5 S3 Pro
;
; Custom board JSON (boards/T5-ePaper-S3.json) and vendored libs (lib/epdiy +
; lib/lvgl + lib/lv_conf.h) come from upstream Xinyuan-LilyGO/T5S3-4.7-e-paper-PRO.
; Their tested defaults are kept verbatim where they don't conflict with Moki.
; ============================================================================

[platformio]
boards_dir = boards

[env:t5_s3_pro]
platform        = espressif32@6.5.0
board           = T5-ePaper-S3
framework       = arduino

board_build.filesystem = littlefs

monitor_speed   = 115200
upload_speed    = 921600
monitor_filters = esp32_exception_decoder

build_flags =
    -DBOARD_HAS_PSRAM
    -DPSRAM_SPEED=120MHz
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DCORE_DEBUG_LEVEL=3
    -DDISABLE_ALL_LIBRARY_WARNINGS
    -Wl,--gc-sections
    ; ── MeshCore compile-test gating (set to 1 when ready to switch protocol) ──
    -DMOKI_USE_MESHCORE=1
    -DESP32
    -DRADIOLIB_STATIC_ONLY=1
    -DRADIOLIB_GODMODE=1
    -DUSE_SX1262
    -DRADIO_CLASS=CustomSX1262
    -DWRAPPER_CLASS=CustomSX1262Wrapper
    ; T5 S3 Pro pin map (matches main.cpp #defines)
    -DP_LORA_NSS=46
    -DP_LORA_DIO_1=10
    -DP_LORA_RESET=1
    -DP_LORA_BUSY=47
    -DP_LORA_SCLK=14
    -DP_LORA_MISO=21
    -DP_LORA_MOSI=13
    -DP_LORA_TX_LED=255
    -DSX126X_DIO2_AS_RF_SWITCH=1
    -DSX126X_DIO3_TCXO_VOLTAGE=2.4
    -DSX126X_CURRENT_LIMIT=140
    -DSX126X_RX_BOOSTED_GAIN=1
    -DLORA_FREQ=869.525
    -DLORA_BW=250
    -DLORA_SF=11
    -DLORA_CR=5
    -DLORA_TX_POWER=14
    -DMAX_GROUP_CHANNELS=4
    -DMAX_CONTACTS=32
    -DPIN_VBAT_READ=255
    -DPIN_USER_BTN=255
    -DPIN_BOARD_SDA=39
    -DPIN_BOARD_SCL=40
    -I variants/lilygo_t5_s3_epaper_pro
    -I lib/MeshCore/src

build_src_filter = +<*> +<../variants/lilygo_t5_s3_epaper_pro/*.cpp>

lib_deps =
    Wire
    SPI
    LittleFS
    SD
